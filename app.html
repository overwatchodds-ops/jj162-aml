<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z6L06TX2HB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Z6L06TX2HB');
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="SimpleAML — AML/CTF compliance tool for Australian accountants. Manage your firm's AML/CTF obligations under the Anti-Money Laundering and Counter-Terrorism Financing Act 2006.">
  <title>SimpleAML — Accountant AML/CTF Compliance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
<div id="app"></div>
<div id="toast" style="display:none" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-5 py-3 rounded-xl shadow-xl z-50"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  firm: {},
  scope: { services: [] },
  program: {},
  staff: [],
  training: [],
  enrolment: {},
  clients: [],
  incidents: [],
  report: { history: [], storageLocation: '' },
  currentScreen: 'dashboard'
};

const DS_LIST = [
  { id:'ds1', name:'Assisting with real estate transactions', desc:'Planning or execution of a sale, purchase or transfer of real estate' },
  { id:'ds2', name:'Assisting with sale/transfer of a body corporate or legal arrangement', desc:'Selling, buying or transferring a company or legal arrangement (e.g. trust)' },
  { id:'ds3', name:'Receiving, holding, controlling or managing client funds or property', desc:'Includes trust accounts used as substitute banking' },
  { id:'ds4', name:'Assisting with equity or debt financing', desc:'Organising, planning or executing equity or debt financing transactions' },
  { id:'ds5', name:'Selling or transferring a shelf company', desc:'Transferring ownership of a pre-registered company to another person' },
  { id:'ds6', name:'Assisting with creation or restructuring of a body corporate or legal arrangement', desc:'Creating or restructuring a company, trust, partnership or similar' },
  { id:'ds7', name:'Acting as or arranging an officer (director, secretary, partner or trustee)', desc:'Acting as, or arranging for another person to act in these roles' },
  { id:'ds8', name:'Acting as or arranging a nominee shareholder', desc:'Acting as, or arranging a nominee shareholder on behalf of another person' },
  { id:'ds9', name:'Providing a registered office or principal place of business address', desc:'Providing a registered office address for a company or legal arrangement' },
];

const PF_TEXT = {
  Low: 'The firm does not knowingly provide services to entities involved in weapons proliferation. All clients are screened against the DFAT consolidated sanctions list on onboarding. The firm does not accept clients from FATF high-risk jurisdictions. Proliferation financing risk is assessed as low.',
  Medium: 'The firm has some international client exposure that warrants monitoring for proliferation financing risk. Clients with connections to higher-risk jurisdictions are subject to enhanced screening.',
  High: 'The firm has identified direct exposure to high-risk jurisdictions or complex international structures that elevate proliferation financing risk. Enhanced controls and AMLCO oversight apply.'
};

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function save() { try { localStorage.setItem('saml_v2', JSON.stringify(S)); } catch(e){} }
function load() {
  try {
    const d = localStorage.getItem('saml_v2');
    if (d) { const p = JSON.parse(d); Object.keys(p).forEach(k => { if(k in S) S[k] = p[k]; }); }
    // Migrate flat service → services[] for existing records
    (S.clients||[]).forEach(c => {
      if (!c.services || c.services.length === 0) {
        c.services = c.service ? [{ serviceName: c.service, dateProvided: c.cddDate||'', newCddRequired: false }] : [];
      }
    });
  } catch(e) {}
}
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.background = type === 'err' ? '#dc2626' : '#1e293b';
  clearTimeout(window._toast);
  window._toast = setTimeout(() => t.style.display = 'none', 2500);
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
window.go = function(screen) {
  const sameScreen = S.currentScreen === screen;
  S.currentScreen = screen; save(); render();
  if (!sameScreen) window.scrollTo(0,0);
};

// ─── COMPLIANCE SCORE ─────────────────────────────────────────────────────────
function complianceScore() {
  let done = 0;
  const steps = [
    Object.keys(S.firm).length > 2,
    !!(S.scope.overallRating || S.scope.noneConfirmed),
    !!(S.program.approvedBy && S.program.approvedDate),
    !!(S.enrolment.enrolled),
    S.staff.length > 0,
    S.training.length > 0,
    (S.report?.history||[]).length > 0,
  ];
  steps.forEach(s => { if(s) done++; });
  return Math.round((done / steps.length) * 100);
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar() {
  const a = (s) => S.currentScreen === s ? 'bg-indigo-50 text-indigo-700 font-semibold' : 'text-slate-600 hover:bg-slate-50';
  const score = complianceScore();
  const firmName = S.firm.name || 'My Firm';
  return `
    <div class="w-60 bg-white h-screen border-r flex flex-col fixed overflow-y-auto">
      <div class="p-5 border-b">
        <div class="font-black text-slate-900 text-lg tracking-tight">SimpleAML</div>
        <div class="text-xs text-slate-400 mt-0.5">${firmName}</div>
        <div class="mt-3">
          <div class="flex justify-between text-xs text-slate-500 mb-1"><span>Setup progress</span><span>${score}%</span></div>
          <div class="w-full bg-slate-100 h-1.5 rounded-full"><div class="bg-indigo-500 h-1.5 rounded-full transition-all" style="width:${score}%"></div></div>
        </div>
      </div>
      <div class="px-3 py-2 bg-amber-50 border-b border-amber-100">
        <p class="text-[10px] text-amber-700 leading-relaxed">AML/CTF obligations apply from <strong>1 July 2026</strong>. Complete CDD before providing any designated service.</p>
      </div>
      <nav class="p-3 flex-1 space-y-0.5 text-sm">
        <button onclick="go('dashboard')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('dashboard')}">Dashboard</button>
        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest pt-3 pb-1 px-3">AML/CTF Compliance Program</div>
        <button onclick="go('firm')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('firm')}">1. Firm Profile</button>
        <button onclick="go('risk')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('risk')}">2. AML/CTF Risk Assessment</button>
        <button onclick="go('program')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('program')}">3. AML/CTF Program</button>
        <button onclick="go('enrolment')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('enrolment')}">4. AUSTRAC Enrolment</button>
        <button onclick="go('staff')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('staff')}">5. Key Personnel Vetting</button>
        <button onclick="go('training')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('training')}">6. Training Register</button>
        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest pt-3 pb-1 px-3">Client Management</div>
        <button onclick="go('clients')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('clients')}">7. Client Register</button>
        <button onclick="go('newclient')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('newclient')}">↳ New Client (CDD)</button>
        <button onclick="go('incidents')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('incidents')}">8. SMR &amp; Incident Register</button>
        <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest pt-3 pb-1 px-3">Reports</div>
        <button onclick="go('report')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('report')}">AML/CTF Compliance Report</button>
        <div class="border-t border-slate-100 mt-3 pt-3">
          <button onclick="go('about')" class="w-full text-left px-3 py-2 rounded-lg transition ${a('about')}">About &amp; Support</button>
        </div>
      </nav>
    </div>`;
}

// ─── SCREENS ──────────────────────────────────────────────────────────────────
const Screens = {};

// DASHBOARD
Screens.dashboard = () => {
  const firmName = S.firm.name;

  // Welcome state
  if (!firmName) return `
    <div class="p-10 max-w-2xl">
      <h1 class="text-2xl font-bold mb-2">Welcome to SimpleAML</h1>
      <p class="text-slate-500 mb-6">AML/CTF compliance for Australian accounting firms.</p>
      <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl mb-6 text-sm text-amber-800">
        <strong>Deadline: 1 July 2026</strong> — Your AML/CTF program must be in place before you provide designated services under the Anti-Money Laundering and Counter-Terrorism Financing Act 2006.
      </div>
      <button onclick="go('firm')" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">Set up my firm →</button>
    </div>`;

  // ── DATA CALCULATIONS ────────────────────────────────────────────────────
  const now = new Date();
  const days = (d) => d ? Math.ceil((new Date(d) - now) / (1000*60*60*24)) : null;
  const yr   = 365*24*60*60*1000;
  const twelveMonthsAgo = new Date(now - yr);
  const thirtyDays = new Date(now.getTime() + 30*24*60*60*1000);

  // Governance
  const firmDone    = Object.keys(S.firm).length > 2;
  const riskDone    = !!(S.scope.overallRating || S.scope.noneConfirmed);
  const riskReview  = S.scope.nextReview ? days(S.scope.nextReview) : null;
  const riskOverdue = riskReview !== null && riskReview < 0;
  const riskDueSoon = riskReview !== null && riskReview >= 0 && riskReview <= 30;
  const programDone = !!(S.program.approvedBy);
  const progReview  = S.program.nextReview ? days(S.program.nextReview) : null;
  const progOverdue = progReview !== null && progReview < 0;
  const progDueSoon = progReview !== null && progReview >= 0 && progReview <= 30;
  const enrolDone   = !!(S.enrolment.enrolled);

  // Staff
  const activeStaff = S.staff.filter(st => !st.status || st.status === 'Active' || st.status === 'On Leave');
  const staffDone   = activeStaff.length > 0;
  const trainingOverdue = S.training.filter(t => t.next && new Date(t.next) < now);
  const trainingDueSoon = S.training.filter(t => t.next && new Date(t.next) >= now && new Date(t.next) <= thirtyDays);
  const trainingDone = S.training.length > 0 && trainingOverdue.length === 0;

  // Clients
  const activeClients = S.clients.filter(c => {
    const lastSvc = (c.services||[]).reduce((latest, sv) => {
      const d = sv.dateProvided ? new Date(sv.dateProvided) : null;
      return d && d > latest ? d : latest;
    }, c.cddDate ? new Date(c.cddDate) : new Date(0));
    return lastSvc > new Date(now - 7*yr);
  });
  const cddComplete = activeClients.filter(c => {
    const inds = c.individuals || [];
    return inds.length > 0 && inds.every(i => i.idOutcome === 'Verified') && inds.every(i => i.screenResult);
  }).length;
  const dormantClients = activeClients.filter(c => {
    const lastSvc = (c.services||[]).reduce((latest, sv) => {
      const d = sv.dateProvided ? new Date(sv.dateProvided) : null;
      return d && d > latest ? d : latest;
    }, c.cddDate ? new Date(c.cddDate) : new Date(0));
    return lastSvc < twelveMonthsAgo;
  });
  const newClients = activeClients.filter(c => c.cddDate && new Date(c.cddDate) >= twelveMonthsAgo);
  const ongoingClients = activeClients.filter(c =>
    (c.services||[]).some(sv => sv.dateProvided && new Date(sv.dateProvided) >= twelveMonthsAgo)
    || (c.cddDate && new Date(c.cddDate) >= twelveMonthsAgo)
  );
  const allInds = activeClients.flatMap(c => c.individuals||[]);
  const screenedInds = allInds.filter(i => i.screenResult).length;
  const clientsCddDone = activeClients.length === 0 || cddComplete === activeClients.length;

  // Incidents
  const openInc   = S.incidents.filter(i => !i.status || i.status === 'Open').length;
  const closedInc = S.incidents.filter(i => i.status === 'Closed').length;

  // Key personnel declarations overdue
  const declOverdue = activeStaff.filter(st =>
    (st.classification === 'Key Personnel' || st.classification === 'Standard AML/CTF Staff') &&
    st.declNext && new Date(st.declNext) < now
  );

  // ── ATTENTION ITEMS ──────────────────────────────────────────────────────
  const attention = []; // { urgent, text, screen }
  if (!firmDone)     attention.push({ urgent:true,  text:'Firm profile not complete', screen:'firm' });
  if (!riskDone)     attention.push({ urgent:true,  text:'Risk assessment not completed', screen:'risk' });
  if (riskOverdue)   attention.push({ urgent:true,  text:`Risk assessment review overdue by ${Math.abs(riskReview)} days`, screen:'risk' });
  if (riskDueSoon)   attention.push({ urgent:false, text:`Risk assessment review due in ${riskReview} days`, screen:'risk' });
  if (!programDone)  attention.push({ urgent:true,  text:'AML/CTF program not approved', screen:'program' });
  if (progOverdue)   attention.push({ urgent:true,  text:`AML/CTF program review overdue by ${Math.abs(progReview)} days`, screen:'program' });
  if (progDueSoon)   attention.push({ urgent:false, text:`AML/CTF program review due in ${progReview} days`, screen:'program' });
  if (!enrolDone)    attention.push({ urgent:true,  text:'AUSTRAC enrolment not recorded', screen:'enrolment' });
  if (!staffDone)    attention.push({ urgent:true,  text:'No staff vetting records', screen:'staff' });
  if (declOverdue.length > 0) attention.push({ urgent:true,  text:`${declOverdue.length} staff declaration${declOverdue.length>1?'s':''} overdue`, screen:'staff' });
  if (trainingOverdue.length > 0) attention.push({ urgent:true,  text:`${trainingOverdue.length} training record${trainingOverdue.length>1?'s':''} overdue`, screen:'training' });
  if (trainingDueSoon.length > 0) attention.push({ urgent:false, text:`${trainingDueSoon.length} training record${trainingDueSoon.length>1?'s':''} due within 30 days`, screen:'training' });
  if (dormantClients.length > 0)  attention.push({ urgent:false, text:`${dormantClients.length} client${dormantClients.length>1?'s':''} dormant — no service in 12 months`, screen:'clients' });
  if (activeClients.length > 0 && cddComplete < activeClients.length) attention.push({ urgent:true, text:`${activeClients.length - cddComplete} client${activeClients.length-cddComplete>1?'s':''} with incomplete CDD`, screen:'clients' });

  // ── OVERALL STATUS ───────────────────────────────────────────────────────
  const hasUrgent = attention.some(a => a.urgent);
  const hasWarning = attention.length > 0;
  const statusLabel = hasUrgent ? 'Action Needed' : hasWarning ? 'Attention Required' : 'Compliant';
  const statusBg    = hasUrgent ? 'bg-red-50 border-red-200' : hasWarning ? 'bg-amber-50 border-amber-200' : 'bg-green-50 border-green-200';
  const statusText  = hasUrgent ? 'text-red-700' : hasWarning ? 'text-amber-700' : 'text-green-700';
  const statusDot   = hasUrgent ? 'bg-red-500' : hasWarning ? 'bg-amber-400' : 'bg-green-500';

  // ── STATUS ROW HELPER ────────────────────────────────────────────────────
  const statusRow = (label, done, warn, detail, screen) => {
    const cls   = done ? 'text-green-600' : warn ? 'text-amber-600' : 'text-red-600';
    const icon  = done ? '✓' : warn ? '⚠' : '✗';
    const badge = done ? 'bg-green-100 text-green-700' : warn ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700';
    return `
    <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50 cursor-pointer transition" onclick="go('${screen}')">
      <td class="px-4 py-2.5 text-sm text-slate-700">${label}</td>
      <td class="px-4 py-2.5">
        <span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2 py-0.5 rounded-full ${badge}">
          <span>${icon}</span>${detail || (done ? 'Complete' : warn ? 'Review due' : 'Incomplete')}
        </span>
      </td>
      <td class="px-4 py-2.5 text-right text-xs text-slate-300">→</td>
    </tr>`;
  };

  return `
    <div class="p-8 max-w-3xl mx-auto space-y-6">

      <!-- FIRM + STATUS VERDICT -->
      <div class="flex items-start justify-between">
        <div>
          <h1 class="text-2xl font-bold">${firmName}</h1>
          <p class="text-slate-400 text-sm mt-0.5">${S.firm.type||''} · ABN ${S.firm.abn||'—'}</p>
        </div>
        <div class="flex items-center gap-2 border rounded-xl px-4 py-2.5 ${statusBg}">
          <div class="w-2.5 h-2.5 rounded-full ${statusDot}"></div>
          <div>
            <div class="text-xs text-slate-500 uppercase tracking-wide font-semibold">AML/CTF Status</div>
            <div class="text-base font-bold ${statusText}">${statusLabel}</div>
          </div>
        </div>
      </div>

      <!-- GETTING STARTED BANNER — shown until program approved -->
      ${!S.program.approvedBy ? `
      <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 flex items-start justify-between gap-4">
        <div>
          <div class="text-sm font-semibold text-indigo-800 mb-0.5">New to AML/CTF?</div>
          <div class="text-xs text-indigo-700">Complete the first 3 items in the sidebar — Firm Profile, Risk Assessment, and AML/CTF Program — to be ready for 1 July 2026.</div>
        </div>
        <button onclick="go('firm')" class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-semibold hover:bg-indigo-700 transition whitespace-nowrap flex-shrink-0">Start here →</button>
      </div>` : ''}

      <!-- COMPLIANCE STATUS TABLE -->
      <div class="bg-white border rounded-xl overflow-hidden">
        <div class="px-4 py-2.5 bg-slate-50 border-b border-slate-100 text-xs font-semibold text-slate-500 uppercase tracking-wide">Compliance Status</div>
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left text-xs font-semibold text-slate-400 px-4 py-2 uppercase tracking-wide">Area</th>
              <th class="text-left text-xs font-semibold text-slate-400 px-4 py-2 uppercase tracking-wide">Status</th>
              <th class="px-4 py-2 w-8"></th>
            </tr>
          </thead>
          <tbody>
            ${statusRow('Firm Profile', firmDone, false, null, 'firm')}
            ${statusRow('AML/CTF Risk Assessment', riskDone && !riskOverdue, riskDueSoon, riskOverdue ? `Overdue ${Math.abs(riskReview)}d` : riskDueSoon ? `Due in ${riskReview}d` : null, 'risk')}
            ${statusRow('AML/CTF Program', programDone && !progOverdue, progDueSoon, progOverdue ? `Review overdue` : progDueSoon ? `Review in ${progReview}d` : null, 'program')}
            ${statusRow('AUSTRAC Enrolment', enrolDone, false, null, 'enrolment')}
            ${statusRow('Key Personnel Vetting', staffDone && declOverdue.length === 0, declOverdue.length > 0, declOverdue.length > 0 ? `${declOverdue.length} declaration${declOverdue.length>1?'s':''} overdue` : null, 'staff')}
            ${statusRow('AML/CTF Training', trainingDone, trainingDueSoon.length > 0, trainingOverdue.length > 0 ? `${trainingOverdue.length} overdue` : trainingDueSoon.length > 0 ? `${trainingDueSoon.length} due soon` : null, 'training')}
            ${statusRow('Client CDD', clientsCddDone, false, activeClients.length > 0 ? cddComplete+' / '+activeClients.length+' complete' : 'No clients', 'clients')}
            ${statusRow('SMR Register', true, openInc > 0, openInc > 0 ? openInc+' open' : S.incidents.length > 0 ? S.incidents.length+' recorded' : 'No incidents', 'incidents')}
          </tbody>
        </table>
      </div>

      <!-- OPERATIONAL SNAPSHOT -->
      <div class="grid grid-cols-3 gap-4">
        <!-- Clients -->
        <div class="bg-white border rounded-xl p-4 cursor-pointer hover:border-indigo-200 transition" onclick="go('clients')">
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Clients</div>
          <div class="space-y-1.5 text-xs">
            <div class="flex justify-between"><span class="text-slate-500">Total (≤7 yrs)</span><span class="font-semibold text-slate-700">${activeClients.length}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">New (12 months)</span><span class="font-semibold text-slate-700">${newClients.length}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Ongoing</span><span class="font-semibold text-slate-700">${ongoingClients.length}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Dormant</span><span class="font-semibold ${dormantClients.length > 0 ? 'text-amber-600' : 'text-slate-700'}">${dormantClients.length}</span></div>
            <div class="flex justify-between border-t border-slate-50 pt-1.5 mt-1.5"><span class="text-slate-500">Individuals screened</span><span class="font-semibold text-slate-700">${screenedInds} / ${allInds.length}</span></div>
          </div>
        </div>
        <!-- Staff -->
        <div class="bg-white border rounded-xl p-4 cursor-pointer hover:border-indigo-200 transition" onclick="go('staff')">
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Staff</div>
          <div class="space-y-1.5 text-xs">
            <div class="flex justify-between"><span class="text-slate-500">Key personnel</span><span class="font-semibold text-slate-700">${activeStaff.filter(st=>st.classification==='Key Personnel').length}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">AML functions</span><span class="font-semibold text-slate-700">${activeStaff.filter(st=>st.classification==='Key Personnel'||st.classification==='Standard AML/CTF Staff').length}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Total assessed</span><span class="font-semibold text-slate-700">${activeStaff.length}</span></div>
            <div class="flex justify-between border-t border-slate-50 pt-1.5 mt-1.5"><span class="text-slate-500">Training current</span><span class="font-semibold ${trainingOverdue.length > 0 ? 'text-red-600' : 'text-slate-700'}">${S.training.length - trainingOverdue.length} / ${S.training.length}</span></div>
          </div>
        </div>
        <!-- Incidents -->
        <div class="bg-white border rounded-xl p-4 cursor-pointer hover:border-indigo-200 transition" onclick="go('incidents')">
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Incidents</div>
          <div class="space-y-1.5 text-xs">
            <div class="flex justify-between"><span class="text-slate-500">Total recorded</span><span class="font-semibold text-slate-700">${S.incidents.length}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Open</span><span class="font-semibold ${openInc > 0 ? 'text-amber-600' : 'text-slate-700'}">${openInc}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">Closed</span><span class="font-semibold text-slate-700">${closedInc}</span></div>
          </div>
        </div>
      </div>

      <!-- ATTENTION REQUIRED -->
      ${attention.length > 0 ? `
      <div class="bg-white border rounded-xl overflow-hidden">
        <div class="px-4 py-2.5 ${hasUrgent ? 'bg-red-50 border-b border-red-100' : 'bg-amber-50 border-b border-amber-100'} text-xs font-semibold ${hasUrgent ? 'text-red-600' : 'text-amber-600'} uppercase tracking-wide">
          Attention Required — ${attention.length} item${attention.length>1?'s':''}
        </div>
        <div class="divide-y divide-slate-50">
          ${attention.map(a => `

// RISK ASSESSMENT
// Auto-calculation functions
function autoServiceRisk(services) {
  // Used only for scope check — section 1 designated services
  const high = ['ds3','ds7','ds8','ds5'];
  const med  = ['ds1','ds6','ds4','ds2'];
  if (!services || !services.length) return null;
  if (services.some(s => high.includes(s))) return 'High';
  if (services.some(s => med.includes(s)))  return 'Medium';
  return 'Low';
}
function autoServiceRiskFromChecks(checks) {
  // Used for service risk RATING — driven by section 2 checkboxes
  if (!checks || !checks.length) return null;
  const high = ['sr-funds','sr-nominee','sr-shelf'];
  const med  = ['sr-property','sr-structures','sr-finance','sr-bodycorp'];
  if (checks.some(c => high.includes(c))) return 'High';
  if (checks.some(c => med.includes(c)))  return 'Medium';
  return 'Low';
}
function autoClientRisk(checks) {
  if (!checks || !checks.length) return null;
  if (checks.includes('cr-international') || checks.includes('cr-cash')) return 'High';
  if (checks.includes('cr-trusts')) return 'Medium';
  if (checks.length > 0) return 'Low';
  return null;
}
function autoGeoRisk(checks) {
  if (!checks || !checks.length) return null;
  if (checks.includes('gr-highrisk'))  return 'High';
  if (checks.includes('gr-overseas'))  return 'Medium';
  return 'Low';
}
function autoResidualRisk(inherent, controls) {
  if (!inherent) return null;
  const count = (controls||[]).length;
  if (inherent === 'High')   return count >= 4 ? 'Medium' : 'High';
  if (inherent === 'Medium') return count >= 3 ? 'Low'    : 'Medium';
  return 'Low';
}
function autoOverallRisk(sr, cr, gr, pf) {
  const vals = [sr, cr, gr, pf].filter(Boolean);
  if (!vals.length) return null;
  if (vals.includes('High'))   return 'High';
  if (vals.includes('Medium')) return 'Medium';
  return 'Low';
}
function ratingBadge(rating) {
  if (!rating) return '<span class="text-xs text-slate-400">Not yet calculated</span>';
  const cls = rating==='High' ? 'bg-red-100 text-red-700' : rating==='Medium' ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700';
  return `<span class="text-xs font-bold px-3 py-1 rounded-full ${cls}">${rating}</span>`;
}
function infoBtn(id) {
  return `<button type="button" onclick="var t=document.getElementById('${id}');t.style.display=t.style.display==='block'?'none':'block'" class="inline-flex items-center justify-center w-4 h-4 rounded-full bg-indigo-500 text-white text-[9px] font-bold cursor-pointer flex-shrink-0 hover:bg-indigo-600">i</button>`;
}
function infoPop(id, content) {
  return `<div id="${id}" style="display:none" class="bg-slate-800 text-slate-200 rounded-xl p-4 text-xs leading-relaxed mt-2">${content}</div>`;
}

  return `

          ${auto && !isOverridden ? `<button type="button" onclick="startOverride('${overrideKey}','${justKey}')" class="text-xs text-indigo-500 hover:text-indigo-700 underline ml-1">Override</button>` : ''}

    </div>`;

Screens.clients = () => {
  const clients = S.clients || [];
  const serviceShort = (id) => {
    const n = DS_LIST.find(d=>d.id===id)?.name || id || '—';
    return n
      .replace('Assisting with creation or restructuring of a ','')
      .replace('Acting as or arranging for a person to act as a ','')
      .replace('Receiving, holding or managing client ','Client ')
      .replace('Sale or transfer of a ','');
  };
  const cddStatus = (c) => {
    const inds = c.individuals || [];
    if (!inds.length) return 'Incomplete';
    const allVerified = inds.every(i => i.idOutcome === 'Verified');
    const allScreened = inds.every(i => i.screenResult);
    if (allVerified && allScreened) return 'Complete';
    return 'Incomplete';
  };
  const thCls = 'text-left text-xs font-semibold text-slate-400 uppercase tracking-wide px-4 py-3';
  const rows = clients.map((c,i) => {
    const expanded = S._expandedClient === i;
    const history = c.history || [];
    const lastUpdated = c.updatedAt ? new Date(c.updatedAt).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : (c.cddDate||'—');
    const inds = c.individuals || [];
    const indCount = inds.length;
    const verified = inds.filter(ind=>ind.idOutcome==='Verified').length;
    const screened = inds.filter(ind=>ind.screenResult).length;
    const status = cddStatus(c);
    const svcShort = serviceShort(c.service);
    const fullSvcName = DS_LIST.find(d=>d.id===c.service)?.name || c.service || '—';

      const outCls = ind.idOutcome==='Verified'?'text-green-700':ind.idOutcome==='Unable to verify'?'text-red-600':'text-slate-400';

      return `<tr class="border-b border-slate-100 last:border-0">
                <td class="py-1.5 pr-4 font-medium text-slate-700">${ind.name||'—'}</td>
                <td class="py-1.5 pr-4 text-slate-500">${ind.role||'—'}</td>
                <td class="py-1.5 pr-4 font-semibold ${outCls}">${ind.idOutcome||'Not recorded'}</td>

// ─── Auto risk rating ───────────────────────────────────────────────────────
function autoClientRiskRating(entityType, service, screenResult, extra) {
  extra = extra || {};
  if (screenResult === 'PEP' || screenResult === 'Sanctions') return 'High';
  if (extra.offshoreJurisdiction) return 'High';
  if (extra.complexStructure)     return 'High';
  if (extra.pepAmongControllers)  return 'High';
  if (entityType === 'Trust' || entityType === 'SMSF') {
    if (['ds3','ds7','ds8','ds5'].includes(service)) return 'High';
    if (extra.cashIntensiveIndustry) return 'High';
    return 'Medium';
  }
  if (['ds3','ds7','ds8','ds5'].includes(service)) return 'High';
  if (['ds1','ds6','ds4','ds2'].includes(service)) return 'Medium';
  if (entityType === 'Private Company' || entityType === 'Partnership') return 'Medium';
  if (extra.cashIntensiveIndustry) return 'Medium';
  return 'Low';
}

// ─── Role guidance per entity type ──────────────────────────────────────────
const ROLE_GUIDANCE = {
  'Individual / Sole Trader': { roles: ['Sole Trader','Authorised Representative'], note: 'Verify the individual\u0027s identity and screen for PEP/sanctions.' },
  'Private Company':  { roles: ['Director','Beneficial Owner (≥25%)','Secretary','Authorised Representative','Other'], note: 'Record all directors and anyone who owns or controls ≥25% of shares or voting rights.' },
  'Partnership':      { roles: ['Partner','Authorised Representative','Other'], note: 'Record all partners and any person with significant control.' },
  'Trust':            { roles: ['Trustee (Individual)','Trustee (Corporate)','Settlor','Appointor / Protector','Beneficiary (≥25% unit holder)','Beneficial Owner','Other'], note: 'Record the trustee(s), settlor, appointor/protector, and any unit holders ≥25%. For corporate trustees, also record their directors.' },
  'SMSF':             { roles: ['Trustee / Member','Corporate Trustee Director','Other'], note: 'Record all trustees and members. If a corporate trustee, also record its directors.' },
  'Other':            { roles: ['Director','Owner','Authorised Representative','Other'], note: 'Record all individuals who own, control, or can benefit from this entity.' },
};

// ADD SERVICE
Screens.addservice = () => {
  const d = S._serviceDraft || {};
  const clientIdx = S._serviceClientIdx;
  const client = clientIdx !== undefined ? S.clients[clientIdx] : null;
  if (!client) { go('clients'); return ''; }
  // Auto risk for new service
  const inds = client.individuals || [];
  const hasHit = inds.some(i => i.screenResult === 'PEP' || i.screenResult === 'Sanctions');
  const newServiceId = d.serviceName || '';
  const autoRisk = autoClientRiskRating(client.entityType, newServiceId, hasHit ? 'PEP' : null, {
    offshoreJurisdiction: client.offshoreJurisdiction,
    complexStructure: client.complexStructure,
    pepAmongControllers: client.pepAmongControllers,
    cashIntensiveIndustry: client.cashIntensiveIndustry,
  });
  const riskCls = autoRisk==='High'?'bg-red-100 text-red-700':autoRisk==='Medium'?'bg-amber-100 text-amber-700':'bg-green-100 text-green-700';
  const currentRiskCls = client.risk==='High'?'bg-red-100 text-red-700':client.risk==='Medium'?'bg-amber-100 text-amber-700':'bg-green-100 text-green-700';
  const riskChanged = newServiceId && autoRisk !== client.risk;
  return `
    <div class="p-8 max-w-2xl space-y-6">
      <div class="flex items-center gap-4">
        <button onclick="go('clients')" class="text-slate-400 hover:text-slate-600 text-sm">← Client Register</button>
        <h1 class="text-2xl font-bold">Add Service — ${client.name}</h1>
      </div>
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-xs text-blue-700">
        Adding a new designated service to an existing client record. CDD has already been completed for this client. If the new service triggers a higher risk rating, you may need to update the client's CDD.
      </div>
      <div class="bg-white border rounded-xl p-5 space-y-4">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">New Designated Service</h2>
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="text-xs text-slate-500">Designated service *</label>
            <select id="svc-service" class="inp mt-1" onchange="updateServiceDraft('serviceName',this.value)">
              <option value="">— Select —</option>
              ${DS_LIST.map(ds=>`<option value="${ds.id}" ${d.serviceName===ds.id?'selected':''}>${ds.name}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-500">Date service provided *</label>
            <input id="svc-date" type="date" class="inp mt-1" value="${d.dateProvided||new Date().toISOString().split('T')[0]}">
          </div>
          <div>
            <label class="text-xs text-slate-500">New CDD required?</label>
            <select id="svc-newcdd" class="inp mt-1">
              <option value="false" ${!d.newCddRequired?'selected':''}>No — existing CDD sufficient</option>
              <option value="true" ${d.newCddRequired?'selected':''}>Yes — update CDD record</option>
            </select>
          </div>
        </div>
        ${newServiceId ? `
        <div class="border rounded-xl p-3 space-y-1">
          <div class="text-xs font-semibold text-slate-500">Risk impact</div>
          <div class="flex items-center gap-3 text-xs">
            <span class="text-slate-400">Current risk:</span>
            <span class="px-2 py-0.5 rounded-full font-semibold text-xs ${currentRiskCls}">${client.risk||'Low'}</span>
            <span class="text-slate-400">→ New service risk:</span>
            <span class="px-2 py-0.5 rounded-full font-semibold text-xs ${riskCls}">${autoRisk}</span>
            ${riskChanged ? `<span class="text-amber-600 font-semibold">⚠ Risk rating will change</span>` : `<span class="text-green-600">No change</span>`}
          </div>
          ${riskChanged ? `<p class="text-xs text-amber-600 mt-1">Consider setting "New CDD required" to Yes and updating the client record.</p>` : ''}
        </div>` : ''}
      </div>
      <div class="flex gap-3">
        <button onclick="go('clients')" class="flex-1 border border-slate-200 py-3 rounded-xl text-sm font-semibold hover:bg-slate-50 transition">Cancel</button>
        <button onclick="saveService()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition">Add Service</button>
      </div>
    </div>`;
};

      </div>
      ${incidents.length > 0 ? `

        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left text-xs font-semibold text-slate-400 uppercase tracking-wide px-4 py-3 w-28">Date</th>
              <th class="text-left text-xs font-semibold text-slate-400 uppercase tracking-wide px-4 py-3">Client</th>
              <th class="text-left text-xs font-semibold text-slate-400 uppercase tracking-wide px-4 py-3">Nature of Suspicion</th>

          <tbody>
            ${incidents.map((inc,i) => {
              const statusCls = inc.status === 'Closed' ? 'text-slate-500' : 'text-amber-600 font-semibold';
              const expanded = S._expandedIncident === i;
              return `
              <tr class="border-b border-slate-50 hover:bg-slate-50 transition ${expanded?'bg-slate-50':''}">
                <td class="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">${fmtDate(inc.dateIdentified)}</td>

                <td class="px-4 py-3 text-xs font-mono text-slate-500">${inc.reference||'—'}</td>
                <td class="px-4 py-3 text-xs ${statusCls}">${inc.status||'Open'}</td>
                <td class="px-4 py-3 text-right whitespace-nowrap">
                  <button onclick="editIncident(${i})" class="text-xs bg-indigo-50 text-indigo-600 font-semibold px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition mr-2">Edit</button>
                  <button onclick="toggleExpandIncident(${i})" class="text-xs text-slate-400 hover:text-slate-600">${expanded?'▲':'▼'}</button>
                </td>
              </tr>
              ${expanded ? `
              <tr>
                <td colspan="6" class="border-b border-slate-100">
                  <div class="bg-slate-50 px-6 py-4 space-y-2">
                    <div class="grid grid-cols-2 gap-x-8 gap-y-2 text-xs">
                      <div><span class="text-slate-400">Entity type: </span><span class="text-slate-600">${inc.entityType||'—'}</span></div>
                      <div><span class="text-slate-400">Individuals involved: </span><span class="text-slate-600">${inc.individualsInvolved||'—'}</span></div>
                      <div><span class="text-slate-400">AMLCO review date: </span><span class="text-slate-600">${inc.amlcoDate ? fmtDate(inc.amlcoDate) : '—'}</span></div>
                      <div><span class="text-slate-400">AUSTRAC reported: </span><span class="text-slate-600">${inc.austrDate ? fmtDate(inc.austrDate) : '—'}</span></div>
                      ${inc.amlcoNotes ? `<div class="col-span-2"><span class="text-slate-400">AMLCO notes: </span><span class="text-slate-600">${inc.amlcoNotes}</span></div>` : ''}
                      ${inc.notes ? `<div class="col-span-2"><span class="text-slate-400">Notes: </span><span class="text-slate-600">${inc.notes}</span></div>` : ''}
                    </div>
                  </div>
                </td>
              </tr>` : ''}`;
            }).join('')}
          </tbody>
        </table>
      </div>` : `<div class="text-center py-10 text-slate-400 text-sm bg-white border rounded-xl">No incidents recorded — click "+ New incident" to add one</div>`}
    </div>`;
};

window.startAddService = function(clientIdx) {
  S._serviceDraft = {};
  S._serviceClientIdx = clientIdx;
  go('addservice');
};
window.updateServiceDraft = function(key, val) {
  if (!S._serviceDraft) S._serviceDraft = {};
  S._serviceDraft[key] = val;
  go('addservice');
};
window.saveService = function() {
  const clientIdx = S._serviceClientIdx;
  const client = clientIdx !== undefined ? S.clients[clientIdx] : null;
  if (!client) { toast('Client not found', 'err'); return; }
  const serviceName = document.getElementById('svc-service')?.value;
  const dateProvided = document.getElementById('svc-date')?.value;
  const newCddRequired = document.getElementById('svc-newcdd')?.value === 'true';
  if (!serviceName) { toast('Service is required', 'err'); return; }
  if (!dateProvided) { toast('Date is required', 'err'); return; }
  if (!client.services) client.services = [];
  client.services.push({ serviceName, dateProvided, newCddRequired });
  client.updatedAt = Date.now();
  const inds = client.individuals || [];
  const hasHit = inds.some(i => i.screenResult === 'PEP' || i.screenResult === 'Sanctions');
  const newRisk = autoClientRiskRating(client.entityType, serviceName, hasHit ? 'PEP' : null, {
    offshoreJurisdiction: client.offshoreJurisdiction,
    complexStructure: client.complexStructure,
    pepAmongControllers: client.pepAmongControllers,
    cashIntensiveIndustry: client.cashIntensiveIndustry,
  });
  if (!client.riskOverride) client.risk = newRisk;
  delete S._serviceDraft;
  delete S._serviceClientIdx;
  save();
  toast('Service added' + (newCddRequired ? ' — remember to update CDD' : ''));
  go('clients');
};

window.startNewIncident = function() {
  S._incidentDraft = {};
  S._incidentEditIdx = undefined;
  go('newincident');
};
window.editIncident = function(i) {
  const inc = S.incidents[i];
  if (!inc) return;
  S._incidentDraft = JSON.parse(JSON.stringify(inc));
  S._incidentEditIdx = i;
  go('newincident');
};
window.toggleExpandIncident = function(i) {
  S._expandedIncident = S._expandedIncident === i ? null : i;

};
window.incidentClientChange = function(name) {
  if (!S._incidentDraft) S._incidentDraft = {};
  S._incidentDraft.clientName = name;
  S._incidentDraft.individualsArr = [];
  const client = S.clients.find(c => c.name === name);
  if (client) S._incidentDraft.entityType = client.entityType || '';
  go('newincident');
};
window.toggleIncidentIndividual = function(name, checked) {
  if (!S._incidentDraft) S._incidentDraft = {};
  if (!S._incidentDraft.individualsArr) S._incidentDraft.individualsArr = [];
  if (checked) {
    if (!S._incidentDraft.individualsArr.includes(name)) S._incidentDraft.individualsArr.push(name);
  } else {
    S._incidentDraft.individualsArr = S._incidentDraft.individualsArr.filter(n => n !== name);
  }
};
window.saveIncident = function() {
  if (!S._incidentDraft) S._incidentDraft = {};
  const clientName = document.getElementById('inc-client')?.value?.trim();
  const dateIdentified = document.getElementById('inc-date')?.value;
  const suspicion = document.getElementById('inc-suspicion')?.value?.trim();
  if (!clientName) { toast('Client is required', 'err'); return; }
  if (!dateIdentified) { toast('Date identified is required', 'err'); return; }
  if (!suspicion) { toast('Nature of suspicion is required', 'err'); return; }
  const client = S.clients.find(c => c.name === clientName);
  const individualsArr = S._incidentDraft.individualsArr || [];
  // Fall back to free-text if no client individuals
  const individualsText = individualsArr.length > 0
    ? individualsArr.join(', ')
    : (document.getElementById('inc-individuals')?.value || '');
  const newRecord = {
    clientName,
    entityType: client?.entityType || document.getElementById('inc-entity-type')?.value || '',
    dateIdentified,
    suspicion,
    individualsInvolved: individualsText,
    individualsArr,
    amlcoDate: document.getElementById('inc-amlco-date')?.value || '',
    amlcoNotes: document.getElementById('inc-amlco-notes')?.value || '',
    austrDate: document.getElementById('inc-austr-date')?.value || '',
    reference: document.getElementById('inc-reference')?.value || '',
    status: document.getElementById('inc-status')?.value || 'Open',
    notes: document.getElementById('inc-notes')?.value || '',
    updatedAt: Date.now()
  };
  const editIdx = S._incidentEditIdx;
  if (editIdx !== undefined && S.incidents[editIdx]) {
    const old = JSON.parse(JSON.stringify(S.incidents[editIdx]));
    const history = old.history || [];
    delete old.history;
    newRecord.history = [old, ...history];
    S.incidents[editIdx] = newRecord;
    toast('Incident record updated — previous version preserved');
  } else {
    newRecord.history = [];
    S.incidents.unshift(newRecord);
    toast('Incident record saved');
  }
  delete S._incidentDraft;
  delete S._incidentEditIdx;
  save();
  go('incidents');
};

  else { S.scope[key] = S.scope[key].filter(x => x !== id); }

window.startOverride = function(overrideKey, justKey) {
  const auto = overrideKey === 'serviceRatingOverride' ? autoServiceRiskFromChecks(S.scope.serviceChecks)
             : overrideKey === 'clientRatingOverride'  ? autoClientRisk(S.scope.clientChecks)
             : overrideKey === 'geoRatingOverride'     ? autoGeoRisk(S.scope.geoChecks)
             : autoOverallRisk(
                 S.scope.serviceRatingOverride || autoServiceRiskFromChecks(S.scope.serviceChecks),
                 S.scope.clientRatingOverride  || autoClientRisk(S.scope.clientChecks),
                 S.scope.geoRatingOverride     || autoGeoRisk(S.scope.geoChecks),
                 S.scope.pfRating
               );
  const val = prompt('Override rating (Low / Medium / High). Auto-calculated: ' + (auto||'N/A') + '\n\nNote: An auditor will scrutinise any downgrade. A justification is required.');
  if (!val) return;
  const clean = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
  if (!['Low','Medium','High'].includes(clean)) { alert('Please enter Low, Medium or High'); return; }
  S.scope[overrideKey] = clean;

window.renderRiskRatings = function() {

  var autoSR = autoServiceRiskFromChecks(sc.serviceChecks);
  var autoCR = autoClientRisk(sc.clientChecks);
  var autoGR = autoGeoRisk(sc.geoChecks);
  var autoOR = autoOverallRisk(
    sc.serviceRatingOverride || autoSR,
    sc.clientRatingOverride  || autoCR,
    sc.geoRatingOverride     || autoGR,
    sc.pfRating
  );
  var effectiveSR = sc.serviceRatingOverride || autoSR;
  var effectiveCR = sc.clientRatingOverride  || autoCR;
  var effectiveGR = sc.geoRatingOverride     || autoGR;
  var effectiveOR = sc.overallRatingOverride || autoOR;

  // Update ds-count badge
  var dsc = document.getElementById('ds-count');
  if (dsc) dsc.textContent = services.length + ' selected';

  // Update each rating row in place
  updateRatingEl('rating-sr', autoSR, sc.serviceRatingOverride);
  updateRatingEl('rating-cr', autoCR, sc.clientRatingOverride);
  updateRatingEl('rating-gr', autoGR, sc.geoRatingOverride);
  updateRatingEl('rating-or', autoOR, sc.overallRatingOverride);

  // Update checkbox highlight colours
  updateCheckHighlights();
};
function updateRatingEl(id, auto, override) {
  var el = document.getElementById(id);

  var html = '<span class="text-xs text-slate-400">Auto-calculated:</span> <span class="text-xs font-bold px-3 py-1 rounded-full ' + cls + '">' + rating + '</span>';
  if (override) {
    html = '<span class="text-xs font-bold px-3 py-1 rounded-full ' + cls + '">' + rating + '</span> <span class="text-xs text-amber-600">(override)</span>';
  }
  el.innerHTML = html;
}

window.importData = function(input) {

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      localStorage.clear();
      for (const key in data) { localStorage.setItem(key, data[key]); }
      location.reload();
    } catch(err) {
      alert('Import failed — file may be corrupted or not a valid SimpleAML backup.');
    }
  };
  reader.readAsText(file);

  // Key Personnel table — full vetting detail
  const checkMark = (val, pass) => val ? `<span style="color:${pass?'#16a34a':'#dc2626'};font-weight:600;">✓</span>` : '<span style="color:#94a3b8;">—</span>';
  const keyTable = rptKeyStaff.length > 0 ? `

      ${th(['Name','Position','Police','Bankruptcy','Screening','Declaration'])}

  // Operational AML Staff table
  const stdTable = rptStdStaff.length > 0 ? `

  // Non-AML Staff table
  const noneTable = rptNoneStaff.length > 0 ? `
    <div style="font-size:11px;font-weight:600;color:#475569;margin:10px 0 6px;">Non-AML Staff — Recorded Only</div>

      ${th(['Name','Position','Assessment Outcome'])}

  const sec4 = section('5','Staff Assessment &amp; Vetting — Summary') + `
    <p style="font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.7;">All staff have been assessed to determine their involvement in AML/CTF functions under the firm's AML/CTF Program. Vetting requirements are applied based on the staff member's AML/CTF role. The tables below reflect active staff only. Departed or inactive staff are retained in SimpleAML records but excluded from this summary.</p>

`;

  // ── SECTION 5: AML/CTF TRAINING REGISTER ────────────────────────────────

  // Active training records — filter to active staff only (soft-link by name)
  const activeStaffNames = new Set(activeAmlStaff.map(st => st.name));
  const activeTraining = S.training.filter(t => !t.name || activeStaffNames.size === 0 || activeStaffNames.has(t.name));

  const trainingSummaryTable = `

  const trainRows = activeTraining.map((t,i) => {

  const sec5 = section('6','AML/CTF Training Register — Summary') +
    `<p style="font-size:11px;color:#64748b;margin-bottom:12px;line-height:1.7;">Training records are maintained for all staff performing AML/CTF functions in accordance with the firm's AML/CTF Program. Full training history and evidence is retained within SimpleAML.</p>` +

    (activeTraining.length > 0 ? `

      ${th(['Staff Member','Training Date','Provider / Course','Score / Outcome','Next Due'])}

    </table>` : `<p style="font-size:11px;color:#94a3b8;">No training records for active AML/CTF staff.</p>`);

  // ── SECTION 6: ENROLMENT & CONTROLS ─────────────────────────────────────
  const declaredControls = e.controls||[];
  const autoCtrls = {
    'ctrl-program':   !!(p.approvedBy&&p.approvedDate),
    'ctrl-amlco':     !!(f.appt&&f.appt.amlco&&f.appt.amlco.name),
    'ctrl-training':  S.training.length > 0,
    'ctrl-dvs':       !!(p.approvedBy),
    'ctrl-screening': !!(p.approvedBy),
    'ctrl-review':    !!(p.nextReview),
    'ctrl-ongoing':   false,
  };
  const CTRL_LABELS = {
    'ctrl-program':'AML/CTF Program approved by senior manager',
    'ctrl-amlco':'AMLCO appointed and oversight operational',
    'ctrl-training':'AML/CTF staff training policy in place',
    'ctrl-dvs':'Customer identification procedure in place',
    'ctrl-screening':'Sanctions / PEP screening procedure in place',
    'ctrl-review':'Annual program review scheduled',
    'ctrl-ongoing':'Ongoing client monitoring process in place',
  };
  const ctrlRows = Object.entries(CTRL_LABELS).map(([id,label],i) => {
    const evidenced = autoCtrls[id];
    const declared = declaredControls.includes(id) || evidenced;
    return tr([
      label,
      declared ? '<span style="color:#16a34a;font-weight:600;">✓ Declared</span>' : '<span style="color:#94a3b8;">Not declared</span>',
      evidenced ? '<span style="color:#16a34a;">Evidenced in SimpleAML</span>' : '<span style="color:#94a3b8;">Manual declaration</span>'
    ], i%2);
  });
  const declaredCount = Object.keys(CTRL_LABELS).filter(id => declaredControls.includes(id) || autoCtrls[id]).length;
  const residualRisk = declaredCount >= 6 ? 'Low' : declaredCount >= 4 ? 'Medium' : inherentRisk;

  // ── SECTION 6: SMR / INCIDENT REGISTER ─────────────────────────────────
  const totalInc    = (S.incidents||[]).length;
  const openInc     = (S.incidents||[]).filter(i => !i.status || i.status === 'Open').length;

  const austrRefs   = (S.incidents||[]).filter(i => i.reference).map(i => i.reference).join(', ') || '—';
  const sec6 = section('8','SMR / Incident Register — Summary') +
    `<p style="font-size:11px;color:#64748b;margin-bottom:12px;line-height:1.7;">All suspicious matter reports and threshold transaction reports are permanently recorded in the firm's SMR/Incident Register.</p>

    const sec7 = section('4','AUSTRAC Enrolment & Controls Declaration') + `

          ? `<tr><td colspan="8" style="padding:6px 8px;font-size:11px;color:#94a3b8;">No individuals recorded.</td></tr>`
          : inds.map((ind,ii) => {
              const outColor = ind.idOutcome==='Verified' ? '#16a34a' : ind.idOutcome==='Unable to verify' ? '#dc2626' : '#94a3b8';

              </tr>`;
            }).join('');

        return `
        <div style="border:1px solid #e2e8f0;border-radius:8px;margin-bottom:16px;overflow:hidden;page-break-inside:avoid;">

              ${c.ttr==='Yes'?'<span style="margin-left:6px;background:#fed7aa;color:#c2410c;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;">TTR</span>':''}

              ${hasHit?'<span style="margin-left:4px;background:#fecaca;color:#dc2626;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;">⚠ Screening Hit</span>':''}
            </div>

          </div>
          <!-- Entity details -->
          <div style="padding:10px 14px;border-bottom:1px solid #e2e8f0;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 24px;">
              ${field('Service provided', svcName)}
              ${field('CDD date', c.cddDate)}
              ${entityDetailFields(c)}
              ${c.riskOverride ? field('Risk override justification', c.riskJust||'No justification recorded') : ''}
              ${histCount > 0 ? field('Change history', histCount+' previous version'+(histCount!==1?'s':'')) : ''}
            </div>
            ${flags.length ? `<div style="margin-top:6px;">${flags.map(k=>`<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px;">⚑ ${riskFlagLabel[k]}</span>`).join('')}</div>` : ''}
            ${attest ? `<div style="margin-top:6px;font-size:10px;color:#16a34a;">✓ ${attest}</div>` : ''}
          </div>
          <!-- Individuals -->
          <div style="padding:10px 14px;">
            <div style="font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">
              Individuals — ${inds.length} recorded · Verified: ${verified}/${inds.length} · Screened: ${screened}/${inds.length}

              <tr>

              </tr>
              ${indRows}
            </table>
          </div>
        </div>`;
      }).join('');

  // ── SECTION 8: CLIENT REGISTER SUMMARY ─────────────────────────────────────
  const now8 = new Date();
  const yr = 365*24*60*60*1000;
  const sevenYrsAgo = new Date(now8 - 7*yr);
  const twelveMonthsAgo = new Date(now8 - yr);
  // Include clients within 7 years
  const activeClients = S.clients.filter(c => {
    const lastSvc = (c.services||[]).reduce((latest, sv) => {
      const d = sv.dateProvided ? new Date(sv.dateProvided) : null;
      return d && d > latest ? d : latest;
    }, c.cddDate ? new Date(c.cddDate) : new Date(0));
    return lastSvc > sevenYrsAgo;
  });
  const newClients = activeClients.filter(c => c.cddDate && new Date(c.cddDate) >= twelveMonthsAgo);
  const ongoingClients = activeClients.filter(c => {
    return (c.services||[]).some(sv => sv.dateProvided && new Date(sv.dateProvided) >= twelveMonthsAgo)
      || (c.cddDate && new Date(c.cddDate) >= twelveMonthsAgo);
  });
  const dormantClients = activeClients.filter(c => {
    const lastActivity = (c.services||[]).reduce((latest, sv) => {
      const d = sv.dateProvided ? new Date(sv.dateProvided) : null;
      return d && d > latest ? d : latest;
    }, c.cddDate ? new Date(c.cddDate) : new Date(0));
    return lastActivity < twelveMonthsAgo;
  });
  const byType = (type) => activeClients.filter(c => c.entityType === type).length;
  const allInds = activeClients.flatMap(c => c.individuals||[]);
  const totalInds = allInds.length;
  const screenedInds = allInds.filter(i => i.screenResult).length;
  const cddDone = activeClients.filter(c => c.tippingAck || (c.individuals||[]).length > 0).length;

  const clientSummaryTable = `
    <table style="width:55%;border-collapse:collapse;margin-bottom:14px;">
      ${th(['Metric','Count'])}
      ${tr(['Total clients recorded (within 7 years)', activeClients.length],0)}
      ${tr(['New clients (last 12 months)', newClients.length],1)}
      ${tr(['Ongoing clients (active service last 12 months)', ongoingClients.length],0)}
      ${tr(['Dormant clients (no service last 12 months)', dormantClients.length],1)}
      ${tr(['Companies / Partnerships recorded', byType('Private Company')+byType('Partnership')],0)}
      ${tr(['Trusts recorded', byType('Trust')],1)}
